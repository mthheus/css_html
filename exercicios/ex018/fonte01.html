<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google Fonts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playwrite+GB+S+Guides:ital@0;1&display=swap');
        body {
            font-family: "Playwrite GB S Guides", cursive;
            font-size: 16px;
            color: black;
        }
        h1 {
            font-family: "Playfair Display", serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Tenetur culpa libero, nobis repudiandae dolor rem perspiciatis quaerat dolores? Mollitia culpa molestiae accusamus repellendus rerum, quae similique doloremque quasi saepe dolorem?</p>
</body>
</html>
