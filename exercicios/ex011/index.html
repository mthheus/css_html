<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir em outro lugar ou diminua o tamanho do site no pc</p>\
    <picture>
        <source media="(max-width:
        750px)" srcset="imagens/FotoP.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/FotoM.png" type=image/png>
        <img src="imagens/FotoG.png" alt="Grande">
        <h1>Reproduzindo Áudio</h1>
        <p>Vamos aprender a reproduzir áudios em HTML5</p>
        <audio autoplay controls>
            <source src="midia/guanacast-33.mp3" type="audio/mp3">    
        </audio>

    </picture>
</body>
</html>
